name: Autonomous SaaS Builder

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (safe free usage)
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Global OpenClaw
        run: npm install -g openclaw

      - name: Configure OpenClaw Local Profile for Actions
        # We physically create the local configuration and credentials in all likely headless paths
        run: |
          # Create both common Linux config paths
          mkdir -p ~/.openclaw/credentials
          mkdir -p ~/.config/openclaw/credentials
          
          # 1. Inject Config (Default Model selection + Auth Profile)
          CONFIG_JSON='{"auth":{"profiles":{"github-copilot:github":{"provider":"github-copilot","mode":"token"}}},"agents":{"defaults":{"model":{"primary":"github-copilot/gpt-4o"}}}}'
          echo "$CONFIG_JSON" > ~/.openclaw/openclaw.json
          echo "$CONFIG_JSON" > ~/.config/openclaw/openclaw.json
          
          # 2. Inject Credentials
          if [ -n "$OPENCLAW_COPILOT_TOKEN" ]; then
             echo "Injecting Copilot Token for Headless Pipeline..."
             CRED_JSON="{\"token\": \"$OPENCLAW_COPILOT_TOKEN\", \"expiresAt\": 4102435200000}"
             echo "$CRED_JSON" > ~/.openclaw/credentials/github-copilot.token.json
             echo "$CRED_JSON" > ~/.config/openclaw/credentials/github-copilot.token.json
          fi
        env:
          OPENCLAW_COPILOT_TOKEN: ${{ secrets.OPENCLAW_COPILOT_TOKEN }}

      - name: OpenClaw Environment Diagnostic
        run: |
          echo "Checking OpenClaw CLI binary..."
          which openclaw
          echo "Checking Auth Status..."
          openclaw status || echo "Status Check Failed"
        env:
          OPENCLAW_COPILOT_TOKEN: ${{ secrets.OPENCLAW_COPILOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Project Dependencies
        run: npm install

      - name: Run Orchestrator Pipeline
        run: node scheduler/cron.js
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN || secrets.GITHUB_TOKEN }}
          WHATSAPP_TO_NUMBER: ${{ secrets.WHATSAPP_TO_NUMBER }}
          OPENCLAW_COPILOT_TOKEN: ${{ secrets.OPENCLAW_COPILOT_TOKEN }}
